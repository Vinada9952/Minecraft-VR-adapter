<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<title>VR Stream</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
  }

  /* Simule un affichage PAYSAGE alors que l'OS reste verrouillé en PORTRAIT
     (le verrou de rotation d'iPhone ne verrouille que le portrait). On
     prend les dimensions du viewport portrait (étroit et haut), on les
     inverse pour ce conteneur (large et bas), on le centre, puis on le
     fait pivoter de 90° vers la gauche : le résultat visuel remplit
     exactement l'écran comme si le téléphone tournait, sans que l'OS
     ne bouge quoi que ce soit. */
  #landscapeWrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100vh;
    height: 100vw;
    transform: translate(-50%, -50%) rotate(90deg);
    transform-origin: center center;
  }

  #vrContainer {
    display: none;
    width: 100%;
    height: 100%;
    --warpTL: 0;
    --warpTR: 0;
    --warpBL: 0;
    --warpBR: 0;
    --eyeGap: 0;
    --eyeZoom: 1;
  }

  .eye {
    flex: 1 1 0;
    height: 100%;
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .eye.left {
    margin-right: calc(var(--eyeGap, 0) * 1px);
  }

  .eye img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    clip-path: polygon(
      calc(var(--warpTL) * 1%) calc(var(--warpTL) * 1%),
      calc(100% - var(--warpTR) * 1%) calc(var(--warpTR) * 1%),
      calc(100% - var(--warpBR) * 1%) calc(100% - var(--warpBR) * 1%),
      calc(var(--warpBL) * 1%) calc(100% - var(--warpBL) * 1%)
    );
    transform: rotate(calc(var(--headRoll, 0) * 1deg)) scale(var(--eyeZoom, 1));
    transform-origin: center center;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #e8e8e8;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }

  #startScreen h1 {
    font-size: 22px;
    margin-bottom: 8px;
  }

  #startScreen p {
    font-size: 14px;
    color: #999;
    margin-bottom: 24px;
    max-width: 320px;
  }

  #startBtn {
    background: #5865f2;
    color: white;
    border: none;
    padding: 16px 32px;
    font-size: 17px;
    border-radius: 12px;
    cursor: pointer;
  }

  #status {
    position: fixed;
    bottom: 8px;
    left: 8px;
    color: #555;
    font-size: 11px;
    z-index: 999;
    font-family: monospace;
  }
</style>
</head>
<body>

  <div id="landscapeWrapper">

    <div id="startScreen">
      <h1>Stream VR</h1>
      <p id="fsHint">Pour un vrai plein écran (sans barre Safari), ouvre cette page,
         appuie sur Partager → "Sur l'écran d'accueil", puis relance-la depuis
         l'icône ajoutée. Sinon elle marche aussi directement dans Safari.</p>

      <label for="sensSlider" style="font-size:13px;color:#aaa;">
        Sensibilité souris : <span id="sensValue">1.0</span>x
      </label>
      <input type="range" id="sensSlider" min="0.1" max="5" step="0.1" value="1.0"
             style="width:240px;margin:10px 0 22px;">

      <button id="startBtn">Démarrer</button>
    </div>

    <div id="vrContainer">
      <div class="eye left"><img id="imgLeft" alt=""></div>
      <div class="eye right"><img id="imgRight" alt=""></div>
    </div>

    <div id="status"></div>
    <div id="debugRoll" style="position:fixed;bottom:8px;left:70px;color:#555;font-size:11px;z-index:999;font-family:monospace;"></div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const imgLeft = document.getElementById("imgLeft");
    const imgRight = document.getElementById("imgRight");
    const statusEl = document.getElementById("status");
    const debugRollEl = document.getElementById("debugRoll");
    const vrContainer = document.getElementById("vrContainer");

    let frameCount = 0;
    let lastFpsTime = Date.now();
    let lastObjectUrl = null;

    socket.on("connect", () => {
      statusEl.textContent = "Connecté au serveur";
    });

    socket.on("disconnect", () => {
      statusEl.textContent = "Déconnecté";
    });

    socket.emit("get_settings");

    socket.on("settings", (data) => {
      vrContainer.style.setProperty("--warpTL", data.warpTL || 0);
      vrContainer.style.setProperty("--warpTR", data.warpTR || 0);
      vrContainer.style.setProperty("--warpBL", data.warpBL || 0);
      vrContainer.style.setProperty("--warpBR", data.warpBR || 0);
      vrContainer.style.setProperty("--eyeGap", data.eyeGap || 0);
      vrContainer.style.setProperty("--eyeZoom", data.eyeZoom || 1);
    });

    // Les frames arrivent en BINAIRE (ArrayBuffer), pas en base64 :
    // c'est plus rapide à recevoir et moins lourd sur le réseau.
    socket.on("frame", (data) => {
      const blob = new Blob([data], { type: "image/jpeg" });
      const url = URL.createObjectURL(blob);

      imgLeft.src = url;
      imgRight.src = url;

      // On libère l'ancienne URL pour éviter une fuite mémoire
      if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);
      lastObjectUrl = url;

      frameCount++;
      const now = Date.now();
      if (now - lastFpsTime >= 1000) {
        statusEl.textContent = frameCount + " FPS";
        frameCount = 0;
        lastFpsTime = now;
      }
    });

    // ---------- Sensibilité (calibration en direct) ----------
    let sensitivity = 1.0;
    const sensSlider = document.getElementById("sensSlider");
    const sensValue = document.getElementById("sensValue");
    sensSlider.addEventListener("input", () => {
      sensitivity = parseFloat(sensSlider.value);
      sensValue.textContent = sensitivity.toFixed(1);
    });

    // ---------- Roulis de la tête (tête penchée sur le côté) ----------
    // Calculé à partir de la gravité (accelerationIncludingGravity), pas du
    // gyroscope : un simple atan2 sur 2 axes ne souffre pas du gimbal lock
    // qui affecte les angles absolus alpha/beta/gamma quand le téléphone
    // est tenu vertical. Lissé pour éviter les tremblements.
    //
    // Calibré directement pour un usage en PAYSAGE (le layout 2 yeux
    // côte à côte n'a de sens qu'en paysage de toute façon).
    let currentRoll = 0; // en radians
    const ROLL_SMOOTHING = 0.15;

    // Un seul endroit à changer si le sens de rotation est inversé :
    // passe à false si true ne donne pas le bon résultat.
    const ROLL_INVERT = true;

    function updateRoll(g) {
      if (!g || g.x === null || g.y === null) return;

      // -PI pour recaler le "0" sur la position à plat/niveau (sinon on
      // partait de 180° au repos avec cette orientation d'axes).
      let raw = Math.atan2(g.y, g.x) - Math.PI;
      if (raw < -Math.PI) raw += 2 * Math.PI;

      // Ramène la différence dans [-PI, PI] pour éviter un saut au passage 180°
      let diff = raw - currentRoll;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;

      currentRoll += diff * ROLL_SMOOTHING;
      while (currentRoll > Math.PI) currentRoll -= 2 * Math.PI;
      while (currentRoll < -Math.PI) currentRoll += 2 * Math.PI;
    }

    // ---------- Gyroscope ----------
    let lastSent = 0;
    const SEND_INTERVAL_MS = 16; // ~60 envois/seconde max

    function handleMotion(event) {
      const g = event.accelerationIncludingGravity;
      updateRoll(g);

      const rollDeg = (ROLL_INVERT ? -1 : 1) * currentRoll * 180 / Math.PI;
      document.documentElement.style.setProperty("--headRoll", rollDeg.toFixed(2));

      // Debug en direct : compare ce que tu vois à ce que tu fais avec le
      // téléphone. gx/gy sont les valeurs brutes de l'accéléromètre,
      // roll est l'angle calculé (0° = à plat / pas d'inclinaison).
      if (g && g.x !== null) {
        debugRollEl.textContent =
          `gx=${g.x.toFixed(1)} gy=${g.y.toFixed(1)} roll=${rollDeg.toFixed(0)}°`;
      }

      const now = Date.now();
      if (now - lastSent < SEND_INTERVAL_MS) return;
      lastSent = now;

      const r = event.rotationRate;
      if (!r || r.beta === null) return;

      // Vitesses de rotation brutes, dans le repère du TÉLÉPHONE.
      const yawRateRaw = r.alpha;   // lacet (tourner la tête gauche/droite)
      const pitchRateRaw = r.beta;  // tangage (hocher la tête haut/bas)

      if (yawRateRaw === null || pitchRateRaw === null) return;

      // Projection dans le repère de la TÊTE (= repère du monde réel) :
      // on fait tourner le vecteur (yaw, pitch) pour que le mouvement de
      // la souris corresponde à une rotation ABSOLUE dans le monde réel
      // plutôt qu'au repère local du téléphone.
      //
      // Calibré sur 2 points fiables et faciles à reproduire :
      // - à plat (roulis = 0) : les 2 axes doivent être inversés (rotation
      //   de 180°)
      // - tourné à 90° : comportement déjà correct (rotation de 90°,
      //   qui échange naturellement les 2 axes)
      // Une seule rotation cohérente de (180° - roulis) satisfait les 2 :
      const phi = Math.PI - currentRoll;
      const cosR = Math.cos(phi);
      const sinR = Math.sin(phi);
      const yawRate = yawRateRaw * cosR - pitchRateRaw * sinR;
      const pitchRate = yawRateRaw * sinR + pitchRateRaw * cosR;

      socket.emit("gyro", {
        beta: pitchRate,
        gamma: yawRate,
        sensitivity: sensitivity
      });
    }

    // ---------- Empêcher la mise en veille ----------
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            statusEl.textContent += " | wakeLock relâché";
          });
        }
      } catch (err) {
        statusEl.textContent = "Wake lock indisponible: " + err.message;
      }
    }

    // Le wake lock est automatiquement relâché si l'app passe en arrière-plan
    // (ex: changement d'app) -> on le redemande quand on revient au premier plan
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        requestWakeLock();
      }
    });

    function enterFullscreenAndLockOrientation() {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) {
        req.call(el).catch(() => {});
      }
    }

    // Si la page est déjà lancée depuis l'icône "écran d'accueil", on est
    // déjà en plein écran natif -> pas besoin d'afficher l'astuce.
    if (window.navigator.standalone === true) {
      document.getElementById("fsHint").style.display = "none";
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      socket.emit("start_stream");

      // Demande de permission iOS 13+ pour le gyroscope (doit être déclenchée
      // par un geste utilisateur, d'où le bouton)
      if (typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function") {
        DeviceMotionEvent.requestPermission()
          .then((state) => {
            if (state === "granted") {
              window.addEventListener("devicemotion", handleMotion);
            } else {
              statusEl.textContent = "Permission gyroscope refusée";
            }
          })
          .catch((err) => {
            statusEl.textContent = "Erreur permission: " + err;
          });
      } else {
        // Android / anciens iOS : pas besoin de permission explicite
        window.addEventListener("devicemotion", handleMotion);
      }

      enterFullscreenAndLockOrientation();
      requestWakeLock();

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("vrContainer").style.display = "flex";
    });
  </script>
</body>
</html>
